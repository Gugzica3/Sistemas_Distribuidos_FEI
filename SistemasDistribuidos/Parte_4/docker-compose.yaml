networks:
  bbs-net:
    driver: bridge

# ─── Shared server defaults ────────────────────────────────────────────────────
x-python-server: &python-server
  build:
    context: ./python
    dockerfile: Dockerfile
  networks:
    - bbs-net
  restart: on-failure
  depends_on:
    - pubsub-proxy
    - reference

x-java-server: &java-server
  build:
    context: ./java
    dockerfile: Dockerfile
  networks:
    - bbs-net
  restart: on-failure
  depends_on:
    - pubsub-proxy
    - reference

# ─── Shared client defaults ────────────────────────────────────────────────────
x-python-client: &python-client
  build:
    context: ./python
    dockerfile: Dockerfile
  networks:
    - bbs-net
  restart: on-failure

x-java-client: &java-client
  build:
    context: ./java
    dockerfile: Dockerfile
  networks:
    - bbs-net
  restart: on-failure

# ═══════════════════════════════════════════════════════════════════════════════
services:

  # ─── Reference Service (rank, server list, heartbeat — no longer provides time) ─
  reference:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: reference
    environment:
      MODE: reference
      REF_BIND_ADDR: "tcp://*:5559"
      HEARTBEAT_TIMEOUT: "60"
      CLEANUP_INTERVAL: "10"
    networks:
      - bbs-net
    restart: on-failure

  # ─── Pub/Sub Proxy (XSUB :5557 ⇄ XPUB :5558) ───────────────────────────────
  pubsub-proxy:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: pubsub-proxy
    environment:
      MODE: proxy
      XSUB_ADDR: "tcp://*:5557"
      XPUB_ADDR: "tcp://*:5558"
    networks:
      - bbs-net
    restart: on-failure

  # ─── Python Servers ─────────────────────────────────────────────────────────
  python-server-1:
    <<: *python-server
    container_name: python-server-1
    environment:
      MODE: server
      BIND_ADDR: "tcp://*:5555"
      SERVER_NAME: python-server-1
      DATA_DIR: /data
      PROXY_XSUB: "tcp://pubsub-proxy:5557"
      PROXY_XPUB: "tcp://pubsub-proxy:5558"
      REF_ADDR: "tcp://reference:5559"
      SYNC_EVERY: "15"
      ELECTION_BIND: "tcp://*:5560"
      ELECTION_PORT: "5560"
    volumes:
      - ./data/python-server-1:/data

  python-server-2:
    <<: *python-server
    container_name: python-server-2
    environment:
      MODE: server
      BIND_ADDR: "tcp://*:5555"
      SERVER_NAME: python-server-2
      DATA_DIR: /data
      PROXY_XSUB: "tcp://pubsub-proxy:5557"
      PROXY_XPUB: "tcp://pubsub-proxy:5558"
      REF_ADDR: "tcp://reference:5559"
      SYNC_EVERY: "15"
      ELECTION_BIND: "tcp://*:5560"
      ELECTION_PORT: "5560"
    volumes:
      - ./data/python-server-2:/data

  # ─── Java Servers ────────────────────────────────────────────────────────────
  java-server-1:
    <<: *java-server
    container_name: java-server-1
    environment:
      MODE: server
      BIND_ADDR: "tcp://*:5555"
      SERVER_NAME: java-server-1
      DATA_DIR: /data
      PROXY_XSUB: "tcp://pubsub-proxy:5557"
      PROXY_XPUB: "tcp://pubsub-proxy:5558"
      REF_ADDR: "tcp://reference:5559"
      SYNC_EVERY: "15"
      ELECTION_BIND: "tcp://*:5560"
      ELECTION_PORT: "5560"
    volumes:
      - ./data/java-server-1:/data

  java-server-2:
    <<: *java-server
    container_name: java-server-2
    environment:
      MODE: server
      BIND_ADDR: "tcp://*:5555"
      SERVER_NAME: java-server-2
      DATA_DIR: /data
      PROXY_XSUB: "tcp://pubsub-proxy:5557"
      PROXY_XPUB: "tcp://pubsub-proxy:5558"
      REF_ADDR: "tcp://reference:5559"
      SYNC_EVERY: "15"
      ELECTION_BIND: "tcp://*:5560"
      ELECTION_PORT: "5560"
    volumes:
      - ./data/java-server-2:/data

  # ─── Python Bots → Python Servers ───────────────────────────────────────────
  python-bot-1:
    <<: *python-client
    container_name: python-bot-1
    environment:
      MODE: client
      BOT_NAME: python-bot-1
      SERVER_ADDRS: "tcp://python-server-1:5555"
      PROXY_XPUB: "tcp://pubsub-proxy:5558"
      STARTUP_DELAY: "15.0"
      MAX_RETRIES: "8"
      RETRY_DELAY: "2.0"
      RECV_TIMEOUT: "10000"
    depends_on:
      - python-server-1
      - pubsub-proxy

  python-bot-2:
    <<: *python-client
    container_name: python-bot-2
    environment:
      MODE: client
      BOT_NAME: python-bot-2
      SERVER_ADDRS: "tcp://python-server-2:5555"
      PROXY_XPUB: "tcp://pubsub-proxy:5558"
      STARTUP_DELAY: "15.0"
      MAX_RETRIES: "8"
      RETRY_DELAY: "2.0"
      RECV_TIMEOUT: "10000"
    depends_on:
      - python-server-2
      - pubsub-proxy

  # ─── Java Bots → Java Servers ────────────────────────────────────────────────
  java-bot-1:
    <<: *java-client
    container_name: java-bot-1
    environment:
      MODE: client
      BOT_NAME: java-bot-1
      SERVER_ADDRS: "tcp://java-server-1:5555"
      PROXY_XPUB: "tcp://pubsub-proxy:5558"
      STARTUP_DELAY_MS: "15000"
      MAX_RETRIES: "8"
      RETRY_DELAY_MS: "2000"
      RECV_TIMEOUT: "10000"
    depends_on:
      - java-server-1
      - pubsub-proxy

  java-bot-2:
    <<: *java-client
    container_name: java-bot-2
    environment:
      MODE: client
      BOT_NAME: java-bot-2
      SERVER_ADDRS: "tcp://java-server-2:5555"
      PROXY_XPUB: "tcp://pubsub-proxy:5558"
      STARTUP_DELAY_MS: "15000"
      MAX_RETRIES: "8"
      RETRY_DELAY_MS: "2000"
      RECV_TIMEOUT: "10000"
    depends_on:
      - java-server-2
      - pubsub-proxy

  # ─── Cross-language bots (Python ↔ Java) ────────────────────────────────────
  python-bot-cross-1:
    <<: *python-client
    container_name: python-bot-cross-1
    environment:
      MODE: client
      BOT_NAME: python-bot-cross-1
      SERVER_ADDRS: "tcp://java-server-1:5555"
      PROXY_XPUB: "tcp://pubsub-proxy:5558"
      STARTUP_DELAY: "17.0"
      MAX_RETRIES: "8"
      RETRY_DELAY: "2.0"
      RECV_TIMEOUT: "10000"
    depends_on:
      - java-server-1
      - pubsub-proxy

  java-bot-cross-1:
    <<: *java-client
    container_name: java-bot-cross-1
    environment:
      MODE: client
      BOT_NAME: java-bot-cross-1
      SERVER_ADDRS: "tcp://python-server-1:5555"
      PROXY_XPUB: "tcp://pubsub-proxy:5558"
      STARTUP_DELAY_MS: "17000"
      MAX_RETRIES: "8"
      RETRY_DELAY_MS: "2000"
      RECV_TIMEOUT: "10000"
    depends_on:
      - python-server-1
      - pubsub-proxy
